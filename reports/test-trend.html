<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试趋势报告</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header .time {
            color: #666;
            font-size: 14px;
        }
        .section {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .section h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .chart-container {
            width: 100%;
            height: 400px;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-card .label {
            color: #666;
            font-size: 14px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 测试趋势报告</h1>
            <div class="time">
                <div>生成时间: 2026-03-27 23:31:42</div>
                <div>历史数据范围: 7 天</div>
                <div>历史记录数量: 3</div>
            </div>
        </div>

        <div class="section">
            <h2>📊 通过率趋势</h2>
            <div class="chart-container">
                <canvas id="passRateChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>📊 测试数量趋势</h2>
            <div class="chart-container">
                <canvas id="testCountChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>📊 执行时长趋势</h2>
            <div class="chart-container">
                <canvas id="durationChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>📦 统计概览</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="number">0.0%</div>
                    <div class="label">平均通过率</div>
                </div>
                <div class="stat-card">
                    <div class="number">0.0</div>
                    <div class="label">平均测试数量</div>
                </div>
                <div class="stat-card">
                    <div class="number">0.0</div>
                    <div class="label">平均失败数量</div>
                </div>
                <div class="stat-card">
                    <div class="number">8.98s</div>
                    <div class="label">平均执行时长</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 处理时间标签
        const timestamps = ["2026-03-27T23:31:30.655514", "2026-03-27T23:31:40.374247", "2026-03-27T23:31:42.011454"];
        const formattedLabels = timestamps.map(t => {
            const date = new Date(t);
            return date.toLocaleString('zh-CN', {"month": "numeric", "day": "numeric", "hour": "2-digit", "minute": "2-digit" });
        });

        // 通过率趋势图
        const passRateCtx = document.getElementById('passRateChart').getContext('2d');
        new Chart(passRateCtx, {
            type: 'line',
            data: {
                labels: formattedLabels,
                datasets: [{
                    label: '通过率 (%)',
                    data: [0.0, 0.0, 0.0],
                    borderColor: '#28a745',
                    backgroundColor: 'rgba(40, 167, 69, 0.1)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: '测试通过率趋势'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        title: {
                            display: true,
                            text: '通过率 (%)'
                        }
                    }
                }
            }
        });

        // 测试数量趋势图
        const testCountCtx = document.getElementById('testCountChart').getContext('2d');
        new Chart(testCountCtx, {
            type: 'bar',
            data: {
                labels: formattedLabels,
                datasets: [{
                    label: '总测试数',
                    data: [0, 0, 0],
                    backgroundColor: '#17a2b8'
                }, {
                    label: '失败测试数',
                    data: [0, 0, 0],
                    backgroundColor: '#dc3545'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: '测试数量趋势'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: '测试数量'
                        }
                    }
                }
            }
        });

        // 执行时长趋势图
        const durationCtx = document.getElementById('durationChart').getContext('2d');
        new Chart(durationCtx, {
            type: 'line',
            data: {
                labels: formattedLabels,
                datasets: [{
                    label: '执行时长 (秒)',
                    data: [1.03, 12.96, 12.96],
                    borderColor: '#ffc107',
                    backgroundColor: 'rgba(255, 193, 7, 0.1)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: '执行时长趋势'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: '执行时长 (秒)'
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
