stages:
  - test
  - coverage
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/playwright"

cache:
  paths:
    - .cache/pip
    - .cache/playwright
    - venv/

test:
  stage: test
  image: mcr.microsoft.com/playwright/python:v1.40.0-jammy
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12"]
        BROWSER: ["chromium", "firefox"]
  
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - playwright install --with-deps $BROWSER
    
    - |
      cat > .env << EOF
      BASE_URL=https://demo.playwright.dev/todomvc
      BROWSER=$BROWSER
      HEADLESS=true
      SLOW_MO=0
      TIMEOUT=30000
      VIEWPORT_WIDTH=1920
      VIEWPORT_HEIGHT=1080
      API_BASE_URL=https://api.example.com
      API_TIMEOUT=30000
      VIDEO_ENABLED=false
      EOF
  
  script:
    - source venv/bin/activate
    - TEST_ENV=testing pytest -v -m "smoke or ui"
  
  artifacts:
    when: always
    paths:
      - reports/allure-results/
      - reports/test-summary.html
      - reports/test-summary.json
      - screenshots/
    expire_in: 30 days

coverage:
  stage: coverage
  image: mcr.microsoft.com/playwright/python:v1.40.0-jammy
  needs:
    - test
  
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - playwright install --with-deps chromium
    
    - |
      cat > .env << EOF
      BASE_URL=https://demo.playwright.dev/todomvc
      BROWSER=chromium
      HEADLESS=true
      EOF
  
  script:
    - source venv/bin/activate
    - pytest -v --cov=core --cov=config --cov-report=term --cov-report=html:reports/coverage-html --cov-report=xml:reports/coverage.xml
  
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  
  artifacts:
    when: always
    paths:
      - reports/coverage-html/
      - reports/coverage.xml
    expire_in: 30 days

pages:
  stage: report
  image: alpine:latest
  needs:
    - test
    - coverage
  only:
    - main
  
  script:
    - apk add --no-cache allure
    - allure generate reports/allure-results -o public/allure-report --clean
    - mkdir -p public/coverage
    - cp -r reports/coverage-html/* public/coverage/
    - cp reports/test-summary.html public/
  
  artifacts:
    paths:
      - public
    expire_in: 30 days
