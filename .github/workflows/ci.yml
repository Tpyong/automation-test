name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        browser: [chromium, firefox]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: |
        playwright install --with-deps ${{ matrix.browser }}

    - name: Create environment file
      run: |
        cat > .env << EOF
        BASE_URL=https://demo.playwright.dev/todomvc
        BROWSER=${{ matrix.browser }}
        HEADLESS=true
        SLOW_MO=0
        TIMEOUT=30000
        VIEWPORT_WIDTH=1920
        VIEWPORT_HEIGHT=1080
        API_BASE_URL=https://api.example.com
        API_TIMEOUT=30000
        VIDEO_ENABLED=false
        EOF

    - name: Run tests
      env:
        TEST_ENV: testing
      run: |
        pytest -v -m "smoke or ui" --browser=${{ matrix.browser }}

    - name: Generate Allure report
      if: always()
      run: |
        allure generate reports/allure-results -o reports/allure-report --clean

    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ matrix.browser }}-${{ matrix.python-version }}
        path: reports/allure-report/
        retention-days: 30

    - name: Upload test summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-summary-${{ matrix.browser }}-${{ matrix.python-version }}
        path: |
          reports/test-summary.html
          reports/test-summary.json
        retention-days: 30

    - name: Upload screenshots on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ matrix.browser }}-${{ matrix.python-version }}
        path: screenshots/
        retention-days: 30

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: |
        playwright install --with-deps chromium

    - name: Create environment file
      run: |
        cat > .env << EOF
        BASE_URL=https://demo.playwright.dev/todomvc
        BROWSER=chromium
        HEADLESS=true
        EOF

    - name: Run tests with coverage
      run: |
        pytest -v --cov=core --cov=config --cov-report=term --cov-report=html:reports/coverage-html --cov-report=xml:reports/coverage.xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          reports/coverage-html/
          reports/coverage.xml
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: reports/coverage.xml
        flags: unittests
        name: codecov-umbrella

  deploy-report:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && always()
    
    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Download Allure report
      uses: actions/download-artifact@v4
      with:
        name: allure-report-chromium-3.12

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: .

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
