name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name "*.pyc" -delete || true
        find . -type f -name "*.pyo" -delete || true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Clean pip cache
      run: |
        pip cache purge || true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --index-url https://pypi.org/simple --no-cache-dir -r requirements.lock
        pip install --index-url https://pypi.org/simple --no-cache-dir -r requirements-dev.txt

    - name: Run security scan
      run: |
        python scripts/security/security_scan.py

    - name: Upload security report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: reports/security-report-*.json
        retention-days: 30

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: security-scan
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        browser: [chromium, firefox]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name "*.pyc" -delete || true
        find . -type f -name "*.pyo" -delete || true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Clean pip cache
      run: |
        pip cache purge || true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --index-url https://pypi.org/simple --no-cache-dir -r requirements.lock

    - name: Install Playwright browsers
      run: |
        echo "Installing Playwright browser: ${{ matrix.browser }}..."
        # 确保使用正确的 playwright 命令
        which playwright || echo "playwright command not found"
        # 显示 Python 路径
        which python
        python --version
        # 安装浏览器
        python -m playwright install --with-deps ${{ matrix.browser }}
        echo "Verifying browser installation..."
        # 检查浏览器安装路径
        echo "Checking browser installation paths..."
        ls -la /home/runner/.cache/ms-playwright/
        # 验证浏览器安装
        python -m playwright install-deps ${{ matrix.browser }} || echo "Note: install-deps failed, continuing..."
        echo "Browser installation completed"

    - name: Create environment file
      run: |
        cat > .env << EOF
        BASE_URL=https://demo.playwright.dev/todomvc
        TEST_BROWSER=${{ matrix.browser }}
        HEADLESS=true
        SLOW_MO=0
        TIMEOUT=30000
        VIEWPORT_WIDTH=1920
        VIEWPORT_HEIGHT=1080
        API_BASE_URL=https://api.example.com
        API_TIMEOUT=30000
        VIDEO_ENABLED=true
        EOF

    - name: Run tests
      env:
        TEST_ENV: testing
      run: |
        # 创建 Allure 结果目录
        mkdir -p reports/allure-results
        # 运行测试并生成 Allure 结果
        # 排除需要真实 API 的测试（使用示例域名）
        # 排除演示用的 Categories 测试（仅用于本地验证）
        export TEST_BROWSER=${{ matrix.browser }}
        pytest -v -m "smoke or ui" \
          --ignore=tests/unit/test_categories_demo.py \
          --alluredir=reports/allure-results

    - name: Generate Allure report
      if: always()
      run: |
        # 安装allure命令行工具
        echo "Downloading Allure..."
        wget -qO- https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz | tar -xz -C /tmp/
        
        # 检查解压结果
        echo "Checking Allure installation..."
        ls -la /tmp/
        ls -la /tmp/allure-2.24.1/
        ls -la /tmp/allure-2.24.1/bin/
        
        # 确保使用绝对路径运行allure
        ALLURE_BIN=/tmp/allure-2.24.1/bin/allure
        if [ -f "$ALLURE_BIN" ]; then
            echo "Allure found at: $ALLURE_BIN"
            $ALLURE_BIN generate reports/allure-results -o reports/allure-report --clean
        else
            echo "Error: Allure binary not found"
            exit 1
        fi

    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ matrix.browser }}-${{ matrix.python-version }}
        path: reports/allure-report/
        retention-days: 30

    - name: Upload test summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-summary-${{ matrix.browser }}-${{ matrix.python-version }}
        path: |
          reports/test-summary.html
          reports/test-summary.json
        retention-days: 30

    - name: Upload screenshots on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ matrix.browser }}-${{ matrix.python-version }}
        path: screenshots/
        retention-days: 30

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name "*.pyc" -delete || true
        find . -type f -name "*.pyo" -delete || true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --index-url https://pypi.org/simple -r requirements.lock

    - name: Install Playwright browsers
      run: |
        echo "Installing Playwright browser: chromium..."
        # 确保使用正确的 playwright 命令
        which playwright || echo "playwright command not found"
        # 显示 Python 路径
        which python
        python --version
        # 安装浏览器
        python -m playwright install --with-deps chromium
        echo "Verifying browser installation..."
        # 检查浏览器安装路径
        echo "Checking browser installation paths..."
        ls -la /home/runner/.cache/ms-playwright/
        # 验证浏览器安装
        python -m playwright install-deps chromium || echo "Note: install-deps failed, continuing..."
        echo "Browser installation completed"

    - name: Create environment file
      run: |
        cat > .env << EOF
        BASE_URL=https://demo.playwright.dev/todomvc
        TEST_BROWSER=chromium
        HEADLESS=true
        SLOW_MO=0
        TIMEOUT=30000
        VIEWPORT_WIDTH=1920
        VIEWPORT_HEIGHT=1080
        VIDEO_ENABLED=true
        EOF

    - name: Run tests with coverage
      run: |
        # 排除需要真实 API 的测试（使用示例域名）
        # 排除演示用的 Categories 测试（仅用于本地验证）
        pytest -v \
          --cov=core \
          --cov=config \
          --cov-report=term \
          --cov-report=html:reports/coverage-html \
          --cov-report=xml:reports/coverage.xml \
          --cov-fail-under=20 \
          --ignore=tests/unit/test_categories_demo.py

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          reports/coverage-html/
          reports/coverage.xml
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: reports/coverage.xml
        flags: unittests
        name: codecov-umbrella

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [security-scan, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t automation-test:latest .

    - name: Test Docker image
      run: |
        docker run --rm automation-test:latest pytest --version

  # 【报告部署任务】仅main分支触发：把Allure测试报告自动部署到GitHub Pages
  deploy-report:
    name: Deploy Allure Report to GitHub Pages
    runs-on: ubuntu-latest   # 使用Ubuntu官方运行器
    needs: test              # 依赖test任务执行完成后再运行
    if: github.ref == 'refs/heads/main'  # 只在main主干分支执行（避免开发分支乱部署）

    # 部署Pages必需权限（官方要求）
    permissions:
      pages: write
      id-token: write

    steps:
      # 1. 下载前面test任务产出的所有Allure报告制品
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts  # 所有报告统一下载到artifacts文件夹，每个报告一个子目录

      # 2. 自动找一份最新Allure报告，整理成Pages可识别目录（修复版命令）
      - name: Merge & prepare Allure report
        run: |
          # 创建标准报告根目录
          mkdir -p allure-report
          
          # 【修复核心】遍历所有报告目录，找到第一个有效报告，完整复制
          for dir in artifacts/allure-report-*; do
            if [ -d "$dir" ]; then
              echo "Found report directory: $dir"
              cp -r "$dir"/* allure-report/
              break  # 找到第一个就停止，避免多报告冲突
            fi
          done
          
          # 打印目录结构，方便排错
          echo "Final report directory contents:"
          ls -la allure-report
          
          # 检查报告是否成功复制
          if [ ! -f "allure-report/index.html" ]; then
            echo "Error: Allure report index.html not found!"
            exit 1
          fi

      # 3. 官方固定步骤：配置Pages环境
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # 4. 把整理好的报告上传为Pages发布制品
      - name: Upload report for Pages deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report  # 要发布的静态报告目录

      # 5. 最终执行部署（官方标准动作，稳、不404）
      - name: Final deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        