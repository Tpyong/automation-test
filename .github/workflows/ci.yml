name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name "*.pyc" -delete || true
        find . -type f -name "*.pyo" -delete || true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Clean pip cache
      run: |
        pip cache purge || true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --index-url https://pypi.org/simple --no-cache-dir -r requirements.lock
        pip install --index-url https://pypi.org/simple --no-cache-dir -r requirements-dev.txt

    - name: Run security scan
      run: |
        python scripts/security_scan.py

    - name: Upload security report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: reports/security-report-*.json
        retention-days: 30

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: security-scan
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        browser: [chromium, firefox]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name "*.pyc" -delete || true
        find . -type f -name "*.pyo" -delete || true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Clean pip cache
      run: |
        pip cache purge || true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --index-url https://pypi.org/simple --no-cache-dir -r requirements.lock

    - name: Install Playwright browsers
      run: |
        echo "Installing Playwright browser: ${{ matrix.browser }}..."
        playwright install --with-deps ${{ matrix.browser }}
        echo "Verifying browser installation..."
        playwright install-deps ${{ matrix.browser }} || echo "Note: install-deps failed, continuing..."
        echo "Browser installation completed"

    - name: Create environment file
      run: |
        cat > .env << EOF
        BASE_URL=https://demo.playwright.dev/todomvc
        TEST_BROWSER=${{ matrix.browser }}
        HEADLESS=true
        SLOW_MO=0
        TIMEOUT=30000
        VIEWPORT_WIDTH=1920
        VIEWPORT_HEIGHT=1080
        API_BASE_URL=https://api.example.com
        API_TIMEOUT=30000
        VIDEO_ENABLED=false
        EOF

    - name: Run tests
      env:
        TEST_ENV: testing
      run: |
        # 创建 Allure 结果目录
        mkdir -p reports/allure-results
        # 运行测试并生成 Allure 结果
        # 排除需要真实 API 的测试（使用示例域名）
        # 排除演示用的 Categories 测试（仅用于本地验证）
        export TEST_BROWSER=${{ matrix.browser }}
        pytest -v -m "smoke or ui" \
          --ignore=tests/api/test_user_api.py \
          --ignore=tests/unit/test_categories_demo.py \
          --alluredir=reports/allure-results

    - name: Generate Allure report
      if: always()
      run: |
        # 安装allure命令行工具
        echo "Downloading Allure..."
        wget -qO- https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz | tar -xz -C /tmp/
        
        # 检查解压结果
        echo "Checking Allure installation..."
        ls -la /tmp/
        ls -la /tmp/allure-2.24.1/
        ls -la /tmp/allure-2.24.1/bin/
        
        # 确保使用绝对路径运行allure
        ALLURE_BIN=/tmp/allure-2.24.1/bin/allure
        if [ -f "$ALLURE_BIN" ]; then
            echo "Allure found at: $ALLURE_BIN"
            $ALLURE_BIN generate reports/allure-results -o reports/allure-report --clean
        else
            echo "Error: Allure binary not found"
            exit 1
        fi

    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ matrix.browser }}-${{ matrix.python-version }}
        path: reports/allure-report/
        retention-days: 30

    - name: Upload test summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-summary-${{ matrix.browser }}-${{ matrix.python-version }}
        path: |
          reports/test-summary.html
          reports/test-summary.json
        retention-days: 30

    - name: Upload screenshots on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ matrix.browser }}-${{ matrix.python-version }}
        path: screenshots/
        retention-days: 30

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name "*.pyc" -delete || true
        find . -type f -name "*.pyo" -delete || true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --index-url https://pypi.org/simple -r requirements.lock

    - name: Install Playwright browsers
      run: |
        echo "Installing Playwright browser: chromium..."
        playwright install --with-deps chromium
        echo "Verifying browser installation..."
        playwright install-deps chromium || echo "Note: install-deps failed, continuing..."
        echo "Browser installation completed"

    - name: Create environment file
      run: |
        cat > .env << EOF
        BASE_URL=https://demo.playwright.dev/todomvc
        TEST_BROWSER=chromium
        HEADLESS=true
        SLOW_MO=0
        TIMEOUT=30000
        VIEWPORT_WIDTH=1920
        VIEWPORT_HEIGHT=1080
        VIDEO_ENABLED=false
        EOF

    - name: Run tests with coverage
      run: |
        # 排除需要真实 API 的测试（使用示例域名）
        # 排除演示用的 Categories 测试（仅用于本地验证）
        pytest -v \
          --cov=core \
          --cov=config \
          --cov-report=term \
          --cov-report=html:reports/coverage-html \
          --cov-report=xml:reports/coverage.xml \
          --cov-fail-under=20 \
          --ignore=tests/api/test_user_api.py \
          --ignore=tests/unit/test_categories_demo.py

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          reports/coverage-html/
          reports/coverage.xml
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: reports/coverage.xml
        flags: unittests
        name: codecov-umbrella

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [security-scan, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t automation-test:latest .

    - name: Test Docker image
      run: |
        docker run --rm automation-test:latest pytest --version

  deploy-report:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && always()
    
    steps:
    - name: Download Allure reports
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Find latest Allure report
      run: |
        # 切换到 artifacts 目录查找
        cd artifacts
        
        # 查找所有 Allure 报告目录
        REPORT_DIRS=$(find . -name "allure-report-*" -type d | sed 's|^\./||')
        if [ -z "$REPORT_DIRS" ]; then
          echo "No Allure reports found"
          exit 1
        fi
        
        # 选择最新的报告目录
        LATEST_REPORT=$(echo "$REPORT_DIRS" | sort | tail -1)
        echo "Using latest report: $LATEST_REPORT"
        
        # 复制报告内容到上级目录
        cp -r "$LATEST_REPORT"/* ..
        
        # 返回上级目录
        cd ..
        
        # 验证复制结果
        echo "Report contents:"
        ls -la

    - name: Upload Allure report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-html
        path: .
        retention-days: 30

    # 部署到 GitHub Pages
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && success()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        destination_dir: allure-report
        keep_files: false
