name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name "*.pyc" -delete || true
        find . -type f -name "*.pyo" -delete || true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.lock
        pip install -r requirements-dev.txt

    - name: Run security scan
      run: |
        python scripts/security_scan.py

    - name: Upload security report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: reports/security-report-*.json
        retention-days: 30

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: security-scan
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        browser: [chromium, firefox]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name "*.pyc" -delete || true
        find . -type f -name "*.pyo" -delete || true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Clean pip cache
      run: |
        pip cache purge || true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.lock

    - name: Install Playwright browsers
      run: |
        playwright install --with-deps ${{ matrix.browser }}

    - name: Create environment file
      run: |
        cat > .env << EOF
        BASE_URL=https://demo.playwright.dev/todomvc
        BROWSER=${{ matrix.browser }}
        HEADLESS=true
        SLOW_MO=0
        TIMEOUT=30000
        VIEWPORT_WIDTH=1920
        VIEWPORT_HEIGHT=1080
        API_BASE_URL=https://api.example.com
        API_TIMEOUT=30000
        VIDEO_ENABLED=false
        EOF

    - name: Run tests
      env:
        TEST_ENV: testing
      run: |
        # 创建 Allure 结果目录
        mkdir -p reports/allure-results
        # 运行测试并生成 Allure 结果
        pytest -v -m "smoke or ui" --browser=${{ matrix.browser }} --alluredir=reports/allure-results

    - name: Generate Allure report
      if: always()
      run: |
        # 安装allure命令行工具
        echo "Downloading Allure..."
        wget -qO- https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz | tar -xz -C /tmp/
        
        # 检查解压结果
        echo "Checking Allure installation..."
        ls -la /tmp/
        ls -la /tmp/allure-2.24.1/
        ls -la /tmp/allure-2.24.1/bin/
        
        # 确保使用绝对路径运行allure
        ALLURE_BIN=/tmp/allure-2.24.1/bin/allure
        if [ -f "$ALLURE_BIN" ]; then
            echo "Allure found at: $ALLURE_BIN"
            $ALLURE_BIN generate reports/allure-results -o reports/allure-report --clean
        else
            echo "Error: Allure binary not found"
            exit 1
        fi

    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ matrix.browser }}-${{ matrix.python-version }}
        path: reports/allure-report/
        retention-days: 30

    - name: Upload test summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-summary-${{ matrix.browser }}-${{ matrix.python-version }}
        path: |
          reports/test-summary.html
          reports/test-summary.json
        retention-days: 30

    - name: Upload screenshots on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ matrix.browser }}-${{ matrix.python-version }}
        path: screenshots/
        retention-days: 30

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name "*.pyc" -delete || true
        find . -type f -name "*.pyo" -delete || true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.lock

    - name: Install Playwright browsers
      run: |
        playwright install --with-deps chromium

    - name: Create environment file
      run: |
        cat > .env << EOF
        BASE_URL=https://demo.playwright.dev/todomvc
        BROWSER=chromium
        HEADLESS=true
        EOF

    - name: Run tests with coverage
      run: |
        pytest -v --cov=core --cov=config --cov-report=term --cov-report=html:reports/coverage-html --cov-report=xml:reports/coverage.xml --cov-fail-under=20

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          reports/coverage-html/
          reports/coverage.xml
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: reports/coverage.xml
        flags: unittests
        name: codecov-umbrella

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [security-scan, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t automation-test:latest .

    - name: Test Docker image
      run: |
        docker run --rm automation-test:latest pytest --version

  deploy-report:
    name: Deploy Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && always()
    
    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Download Allure reports
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Find latest Allure report
      run: |
        # 查找所有 Allure 报告目录
        REPORT_DIRS=$(find artifacts -name "allure-report-*" -type d)
        if [ -z "$REPORT_DIRS" ]; then
          echo "No Allure reports found"
          exit 1
        fi
        
        # 选择最新的报告目录
        LATEST_REPORT=$(ls -t $REPORT_DIRS | head -1)
        echo "Using latest report: $LATEST_REPORT"
        
        # 复制报告内容到当前目录
        cp -r "artifacts/$LATEST_REPORT"/* .

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: .

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
