name: Automated Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
        browser: [chromium, firefox, webkit]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Clean pip cache
      run: |
        pip cache purge || true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --index-url https://pypi.org/simple -r requirements.lock

    - name: Install Playwright browsers
      run: |
        echo "Installing Playwright browsers for ${{ matrix.browser }}..."
        playwright install --with-deps ${{ matrix.browser }}
        echo "Verifying browser installation..."
        playwright install-deps ${{ matrix.browser }} || echo "Note: install-deps failed, continuing..."
        echo "Browser installation completed"

    - name: Run tests
      run: |
        pytest tests/ -v --browser=${{ matrix.browser }} --alluredir=allure-results
      env:
        TEST_ENV: testing
        HEADLESS: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}-${{ matrix.browser }}
        path: |
          reports/
          allure-results/

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --index-url https://pypi.org/simple -r requirements-dev.txt

    - name: Run code quality checks
      run: |
        echo "Running pylint..."
        pylint core/ tests/ --output-format=text --fail-under=8.0
        echo "Running flake8..."
        flake8 core/ tests/ --max-line-length=120 --ignore=E203,W503
        echo "Running black check..."
        black --check core/ tests/
        echo "Running isort check..."
        isort --check-only core/ tests/

  allure-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Merge Allure results
      run: |
        mkdir -p allure-results
        for dir in artifacts/test-results-*/allure-results; do
          if [ -d "$dir" ]; then
            cp -r "$dir"/* allure-results/
          fi
        done

    - name: Generate Allure Report
      run: |
        pip install allure-pytest
        # 安装allure命令行工具
        echo "Downloading Allure..."
        wget -qO- https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz | tar -xz -C /tmp/
        
        # 检查解压结果
        echo "Checking Allure installation..."
        ls -la /tmp/
        ls -la /tmp/allure-2.24.1/
        ls -la /tmp/allure-2.24.1/bin/
        
        # 确保使用绝对路径运行allure
        ALLURE_BIN=/tmp/allure-2.24.1/bin/allure
        if [ -f "$ALLURE_BIN" ]; then
            echo "Allure found at: $ALLURE_BIN"
            $ALLURE_BIN generate allure-results --clean -o allure-report
        else
            echo "Error: Allure binary not found"
            exit 1
        fi

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

  notify:
    needs: [test, code-quality]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const message = `❌ 测试失败！\n\n` +
            `分支: ${context.ref}\n` +
            `提交: ${context.sha}\n` +
            `工作流: ${context.workflow}\n\n` +
            `请检查: ${context.payload.repository.html_url}/actions/runs/${context.runId}`;

          if (context.issue.number) {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
          }
