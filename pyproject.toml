[tool.black]
line-length = 120
target-version = ['py312']
include = '\.pyi?$'
exclude = '''(
    /(\n        \.git
        | \.venv
        | __pycache__
        | build
        | dist
        | .pytest_cache
        | .tox
        | .mypy_cache
        | .pylint.d
        | .flake8.d
    )/
)'''

[tool.isort]
profile = "black"
line_length = 120
