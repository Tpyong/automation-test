[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --alluredir=reports/allure-results
    --clean-alluredir
    --reruns=2
    --reruns-delay=1
    ; 以下为并行测试相关配置,关闭后默认串行测试 关闭原因：并行时测试报告生成器没有收集到任何测试结果
    ; -n auto
    ; --dist=loadfile
    ; --tx=4*popen
markers =
    smoke: 冒烟测试
    regression: 回归测试
    ui: UI测试
    api: API测试
    slow: 慢速测试
    login: 登录相关测试
    logout: 登出相关测试
    payment: 支付相关测试
    checkout: 结账相关测试
    search: 搜索相关测试
    admin: 管理后台测试
    critical: 关键路径测试
    positive: 正向测试
    negative: 负向测试
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
